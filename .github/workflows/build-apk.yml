name: build-apk

# Builds the device-side AccessibilityService (server/) into an installable APK.
# The APK can't be built in the dev container (no Android SDK/JDK), so CI is the
# canonical build: download the artifact, then `adb install -r app-debug.apk`.

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: server
        run: |
          gradle wrapper --gradle-version 8.7
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: autox-server-apk
          path: server/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
