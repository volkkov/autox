plugins {
    id 'com.android.application'
}

android {
    namespace 'com.gitshrl.autox'
    compileSdk 34

    defaultConfig {
        applicationId 'com.gitshrl.autox'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '0.1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// No third-party dependencies: the server uses only framework APIs
// (AccessibilityService, ServerSocket), so the APK stays tiny.
